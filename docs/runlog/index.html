    <div class="ss"><div class="n">${tot}</div><div class="l">Total Runs</div></div>
    <div class="ss"><div class="n">${hi}</div><div class="l">High Confidence</div></div>
    <div class="ss"><div class="n">${types.length}</div><div class="l">Outreach Types</div></div>
    <div class="ss"><div class="n">${(tok/1000).toFixed(1)}k</div><div class="l">Tokens Used</div></div>`;
  document.getElementById('fb').innerHTML=['all',...types].map(t=>`<button class="${t===flt?'a':''}" onclick="sf('${t}')">${t==='all'?'All':t.replace(/_/g,' ')}</button>`).join('');
  if(!runs.length){document.getElementById('cc').innerHTML='<div style="text-align:center;padding:80px;color:#555">No runs found.</div>';return}
  document.getElementById('cc').innerHTML=runs.map((r,i)=>{
    const p=gp(r),cl=gc(r),id=r.run_id||i,type=p.outreach_type||'';
    const ev=(p.evidence_used||[]).map(x=>`<li>${e(x)}</li>`).join('');
    const pr=(p.recommended_products||[]).length>0?(p.recommended_products||[]).map(x=>`<div class="pc"><div class="pn">${e(x.item)}</div><div class="pr">${e(x.reason)}</div></div>`).join(''):'<span style="color:#888;font-size:13px">—</span>';
    const dr=(p.wechat_drafts||[]).map(x=>`<div class="dc"><div class="dt">${e(x.tone)}</div><div class="dm">${e(x.message)}</div></div>`).join('');
    const ri=(p.risk_flags||[]).length>0?`<ul class="rl">${p.risk_flags.map(x=>`<li>${e(x)}</li>`).join('')}</ul>`:'<span style="color:#5a9e6f;font-size:13px">None</span>';
    const dn=(p.do_not_say||[]).length>0?`<div class="st">Do Not Say</div><ul class="dl">${p.do_not_say.map(x=>`<li>${e(x)}</li>`).join('')}</ul>`:'';
    return `<div class="rc" id="c-${id}"><div class="ch" onclick="tg('${id}')"><div class="ci"><div class="av">${(cl.name||'?')[0]}</div><div><div class="cn">${e(cl.name)} · ${r.input?.client_id||''}</div><div class="ct">${e(cl.tag)} · ${ft(r.timestamp)}</div></div></div><div class="cb"><span class="b bt">${type.replace(/_/g,' ')}</span><span class="b ${cb(p.confidence||'low')}">${p.confidence||'low'}</span><span class="ei">▼</span></div></div><div class="bd"><div class="st">Recommended Angle</div><div class="ab"><div class="al">${e(p.best_angle)}</div><div class="as">${e(p.angle_summary)}</div></div><div class="st">Evidence Used (${(p.evidence_used||[]).length})</div><ul class="el">${ev}</ul><div class="st">Recommended Products</div><div class="pg">${pr}</div><div class="st">WeChat Message Drafts</div>${dr}<div class="st">Risk Flags</div>${ri}${dn}<div class="st">Next Step</div><div class="ns">${e(p.next_step||'—')}</div><div class="st">Trace</div><div class="tg"><div class="ti"><div class="tk">Model</div><div class="tv">${r.model||''}</div></div><div class="ti"><div class="tk">Input Tokens</div><div class="tv">${(r.token_usage?.input_tokens||0).toLocaleString()}</div></div><div class="ti"><div class="tk">Output Tokens</div><div class="tv">${(r.token_usage?.output_tokens||0).toLocaleString()}</div></div><div class="ti"><div class="tk">Sources</div><div class="tv">${(r.trace?.retrieved_sources||[]).join(', ')}</div></div></div></div></div>`}).join('');
}

function tg(id){const el=document.getElementById('c-'+id);if(el)el.classList.toggle('ex')}
function sf(f){flt=f;render()}
function toggleLang(){lang=lang==='zh'?'en':'zh';document.getElementById('ll').textContent=lang==='zh'?'English':'中文';document.getElementById('fl').textContent=lang==='zh'?'🇬🇧':'🇨🇳';render()}
initData().then(() => {
  if (!DATA || !DATA.length) {
    document.getElementById("cc").innerHTML =
      '<div style="text-align:center;padding:80px;color:#888">No run data. Put <code style="color:#c9a96e">run_log.json</code> next to this HTML and open via a local server (see README in this folder).</div>';
    return;
  }
  render();
});
</script>
</body>
</html>
